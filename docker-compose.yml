version: '3.8'
services:
  openclaw:
    image: "coollabsio/openclaw:2026.2.6"
    restart: unless-stopped
    networks:
      - dokploy-net
      - core-agentes-net
    environment:
      # ════════════════════════════════════════════════════════════════════
      # 1. LA JAULA: CAPA DE SEGURIDAD NEMOCLAW (OPEN_SHELL)
      # ════════════════════════════════════════════════════════════════════
      - NEMOCLAW_SANDBOX_NAME=alianedos-core
      - NEMOCLAW_NON_INTERACTIVE=1
      - NEMOCLAW_POLICY_MODE=custom
      - NEMOCLAW_PROVIDER=nim
      # Parametrizado para evitar obsolescencia del catálogo de NVIDIA
      - NEMOCLAW_MODEL=${NEMOCLAW_SECURITY_MODEL}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}

      # ════════════════════════════════════════════════════════════════════
      # 2. EL CEREBRO ACTIVO: ENRUTAMIENTO DINÁMICO (JOSEIAS)
      # ════════════════════════════════════════════════════════════════════
      - OPENAI_API_KEY=${ACTIVE_API_KEY}
      - OPENAI_BASE_URL=${ACTIVE_BASE_URL}
      - OPENCLAW_PRIMARY_MODEL=${ACTIVE_MODEL}

      # ════════════════════════════════════════════════════════════════════
      # 3. BÓVEDA DE APIS MULTI-PROVEEDOR
      # ════════════════════════════════════════════════════════════════════
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DASHSCOPE_API_KEY=${QWEN_API_KEY}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}

      # ════════════════════════════════════════════════════════════════════
      # 4. SISTEMA Y CONFIGURACIÓN BASE
      # ════════════════════════════════════════════════════════════════════
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORT=8080
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_BIND=loopback
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      - BROWSER_SNAPSHOT_MODE=efficient
      - BROWSER_REMOTE_TIMEOUT_MS=1500
      - BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS=3000
      - HOOKS_ENABLED=true

    ports:
      - "8080:8080"
    volumes:
      - joseias-data:/data
    depends_on:
      browser:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 1g

  browser:
    image: "coollabsio/openclaw-browser:latest"
    restart: unless-stopped
    networks:
      - core-agentes-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santo_Domingo
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9222' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

# ════════════════════════════════════════════════════════════════════
# DECLARACIÓN DE REDES EXTERNAS (Aislamiento SRE)
# ════════════════════════════════════════════════════════════════════
networks:
  dokploy-net:
    external: true
  core-agentes-net:
    external: true

volumes:
  joseias-data:
    driver: local
  browser-data:
    driver: local
