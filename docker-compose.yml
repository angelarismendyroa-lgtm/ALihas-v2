services:
  openclaw:
    image: coollabsio/openclaw:2026.2.6
    restart: unless-stopped
    networks:
      - dokploy-network
      - core-agentes-net
      - gateway-net
      - vector-net
    environment:
      # ════════════════════════════════════════════════════════════════════
      # 1. LA JAULA: CAPA DE SEGURIDAD NEMOCLAW (OPEN_SHELL)
      # ════════════════════════════════════════════════════════════════════
      - NEMOCLAW_SANDBOX_NAME=alianedos-core
      - NEMOCLAW_NON_INTERACTIVE=1
      - NEMOCLAW_POLICY_MODE=strict
      - NEMOCLAW_PROVIDER=nim
      - NEMOCLAW_MODEL=${NEMOCLAW_SECURITY_MODEL}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}

      # ════════════════════════════════════════════════════════════════════
      # 2. EL CEREBRO ACTIVO: ENRUTAMIENTO DINÁMICO (JOSEIAS)
      # ════════════════════════════════════════════════════════════════════
      - OPENAI_API_KEY=${ACTIVE_API_KEY}
      - OPENAI_BASE_URL=${ACTIVE_BASE_URL}
      - OPENCLAW_PRIMARY_MODEL=${ACTIVE_MODEL}

      # ════════════════════════════════════════════════════════════════════
      # 3. BÓVEDA DE APIS MULTI-PROVEEDOR
      # ════════════════════════════════════════════════════════════════════
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DASHSCOPE_API_KEY=${QWEN_API_KEY}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}

      # ════════════════════════════════════════════════════════════════════
      # 4. SISTEMA Y CONFIGURACIÓN BASE
      # ════════════════════════════════════════════════════════════════════
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORT=8082
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_BIND=loopback
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
      - BROWSER_CDP_URL=http://browser:9222
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      - BROWSER_SNAPSHOT_MODE=efficient
      - BROWSER_REMOTE_TIMEOUT_MS=1500
      - BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS=3000
      - HOOKS_ENABLED=true
      - HOOKS_TOKEN=${HOOKS_TOKEN}

    ports:
      - "8082:8082"
    volumes:
      - joseias-data:/data
      - ./policies:/data/.openclaw/policies:ro
      - ./identity:/data/workspace/identity:ro
    depends_on:
      browser:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 1g
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # HTTP → redirect a HTTPS
      - traefik.http.routers.alihas-web.rule=Host(`alihas.alianed.com`)
      - traefik.http.routers.alihas-web.entrypoints=web
      - traefik.http.routers.alihas-web.middlewares=redirect-to-https@file
      - traefik.http.routers.alihas-web.service=alihas-web
      - traefik.http.services.alihas-web.loadbalancer.server.port=8082
      # HTTPS
      - traefik.http.routers.alihas-websecure.rule=Host(`alihas.alianed.com`)
      - traefik.http.routers.alihas-websecure.entrypoints=websecure
      - traefik.http.routers.alihas-websecure.tls.certresolver=letsencrypt
      - traefik.http.routers.alihas-websecure.service=alihas-websecure
      - traefik.http.services.alihas-websecure.loadbalancer.server.port=8082

  browser:
    image: coollabsio/openclaw-browser:latest
    hostname: browser
    restart: unless-stopped
    networks:
      - core-agentes-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santo_Domingo
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9222' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

# ════════════════════════════════════════════════════════════════════
# 7 REDES TRONCALES — ALiANeD Core Architecture
# ════════════════════════════════════════════════════════════════════
networks:
  dokploy-network:       # 1. Infraestructura / Traefik
    external: true
  core-agentes-net:      # 2. Cerebros corporativos (OpenClaw, Spirit, Joseias, Tony)
    external: true
  mayordomia-net:        # 3. Agentes de voz
    external: true
  vector-net:            # 4. Memoria semántica (Qdrant, embeddings)
    external: true
  humandata-net:         # 5. Datos humanos / CRM / n8n
    external: true
  gateway-net:           # 6. Canales externos (Telegram, webhooks, APIs)
    external: true
  observability-net:     # 7. Logs, métricas, trazabilidad
    external: true

volumes:
  joseias-data:
    driver: local
  browser-data:
    driver: local
